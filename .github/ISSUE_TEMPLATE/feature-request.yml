name: ✨ Feature Request
description: Propose a new feature or improvement for HireTrack AI
title: "[FEATURE]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make HireTrack AI better? Please outline it below.
  - type: textarea
    id: problem
    attributes:
      label: Is your feature request related to a problem?
      description: A clear and concise description of what the problem is.
      placeholder: E.g., I'm always frustrated when...
    validations:
      required: false
  - type: textarea
    id: solution
    attributes:
      label: Describe the Solution You'd Like
      description: A clear and concise description of what you want to happen.
      placeholder: Describe the requested behavior...
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Describe Alternatives You've Considered
      description: A clear and concise description of any alternative solutions or features you've considered.
      placeholder: Any other ways this could be solved...
  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, mockup screenshots, or diagrams about the feature request here.
