name: Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: Production Release
    runs-on: ubuntu-latest
    if: github.repository_owner == 'google' # Safety guard, change to your GitHub organization/user

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Build Application
        run: npm run build
        env:
          DATABASE_URL: "postgresql://postgres:postgrespassword@localhost:5432/hiretrack_ai?schema=public"
          AUTH_SECRET: "mock-secret-key-at-least-32-chars-long-1234"
          NEXT_PUBLIC_APP_URL: "http://localhost:3000"
          NODE_ENV: "production"

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: Release v${{ github.run_number }}
          body: |
            ## HireTrack AI v${{ github.run_number }}
            
            This release marks the latest production deployment of the HireTrack AI applicant tracking platform.
            
            ### Automated Checks
            - All CI verification passed (linting, types, and unit tests).
            - Compiled successfully for Vercel/Docker production environments.
            
            ### Commits in this version
            See the commit history of this push for a detailed log of improvements.
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
